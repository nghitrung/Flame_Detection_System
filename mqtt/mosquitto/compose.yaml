services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt
    volumes:
      - ./config:/mosquitto/config
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    stdin_open: true
    tty: true
    restart: always
  mysql:
    image: mysql
    container_name: mysql-iot
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: data_sensors
      MYSQL_USER: Flame_Detection_System
      MYSQL_PASSWORD: 123
    volumes:
      - ./mysql_data:/mosquitto/mysql
    ports:
      - "3306:3306"
  backend:
    image: node
    container_name: backend_iot
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "npm install && node server.js"
    ports: 
      - "5000:5000"
    depends_on:
      - mosquitto
      - mysql
    